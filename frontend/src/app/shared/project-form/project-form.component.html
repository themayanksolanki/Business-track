<div class="modal fade" tabindex="-1" aria-hidden="true" [appModal]="open" (appModalClosed)="closed.emit()">
  <div class="modal-dialog modal-dialog-centered projects-create-dialog">
    <div class="modal-content projects-create-content shadow-lg">
      <div class="modal-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h5 class="card-title mb-0"><i class="bi bi-plus-circle me-2"></i>New Project</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        @if (error) {
          <div class="alert alert-danger py-2">{{ error }}</div>
        }

        <form [formGroup]="form" (ngSubmit)="submit()">
          <div class="mb-3">
            <label class="field-label">Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control field-input" formControlName="name" placeholder="Project name" />
            @if (form.get('name')?.touched && form.get('name')?.invalid) {
              <div class="field-error">Name is required</div>
            }
          </div>

          <div class="mb-3">
            <label class="field-label">Description</label>
            <textarea class="form-control field-input" style="height:auto" formControlName="description" rows="3"
                      placeholder="Optional description"></textarea>
          </div>

          @if (departments.length > 0) {
            <div class="mb-4">
              <label class="field-label">Department</label>
              <select class="form-select field-input" formControlName="department">
                <option value="">No department</option>
                @for (dept of departments; track dept.id) {
                  <option [value]="dept.id">{{ dept.name }}</option>
                }
              </select>
            </div>
          }

          @if (categories.length > 0) {
            <div class="mb-4">
              <label class="field-label">Category</label>
              <select class="form-select field-input" formControlName="category">
                <option value="">No category</option>
                @for (cat of categories; track cat.id) {
                  <option [value]="cat.id">{{ cat.name }}</option>
                }
              </select>
            </div>
          }

          @if (users.length > 0) {
            <div class="mb-4">
              <label class="field-label">Owner</label>
              <select class="form-select field-input" formControlName="owner">
                <option value="">Me (default)</option>
                @for (u of users; track u.id) {
                  <option [value]="u.id">{{ u.username }}</option>
                }
              </select>
            </div>
          }

          <div class="row g-3 mb-4">
            <div class="col-6">
              <label class="field-label">Priority</label>
              <select class="form-select field-input" formControlName="priority">
                <option value="">Default (Medium)</option>
                @for (p of priorityOptions; track p) {
                  <option [value]="p">{{ p }}</option>
                }
              </select>
            </div>
            <div class="col-6">
              <label class="field-label">Effort</label>
              <select class="form-select field-input" formControlName="effort">
                <option value="">Default (Medium)</option>
                @for (e of effortOptions; track e) {
                  <option [value]="e">{{ e }}</option>
                }
              </select>
            </div>
          </div>

          <div class="mb-4">
            <label class="field-label">Tags</label>
            <app-tag-picker
              [allTags]="allTags"
              [selectedTags]="selectedTags"
              (tagsChange)="onTagsChange($event)"
              (tagCreated)="onTagCreated($event)">
            </app-tag-picker>
          </div>

          @if (allowDates) {
            <div class="row g-3 mb-4">
              <div class="col-12">
                <label class="field-label mb-2">Start</label>
                <div class="d-flex gap-2">
                  <app-date-picker [value]="startDate" (valueChange)="startDate = $event"></app-date-picker>
                  <app-time-picker [value]="startTime" (valueChange)="startTime = $event"></app-time-picker>
                </div>
              </div>
              <div class="col-12">
                <label class="field-label mb-2">End</label>
                <div class="d-flex gap-2">
                  <app-date-picker [value]="endDate" [min]="startDate" (valueChange)="endDate = $event"></app-date-picker>
                  <app-time-picker [value]="endTime" (valueChange)="endTime = $event"></app-time-picker>
                </div>
              </div>
            </div>
          }

          <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-light modal-submit-btn" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary modal-submit-btn" [disabled]="loading">
              @if (loading) { <span class="spinner-border spinner-border-sm me-2"></span> }
              {{ loading ? 'Creating...' : 'Create Project' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
