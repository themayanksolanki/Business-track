<div
  class="modal fade"
  tabindex="-1"
  aria-hidden="true"
  [appModal]="open"
  [appModalOptions]="{ backdrop: 'static' }"
  (appModalClosed)="cancelled.emit()"
>
  <div class="modal-dialog modal-dialog-centered cd-dialog">
    <div class="modal-content cd-content" (click)="$event.stopPropagation()">

      <!-- Icon -->
      <div class="cd-icon-wrap">
        <i class="bi bi-trash3-fill cd-icon"></i>
      </div>

      <!-- Text -->
      <h5 class="cd-title">{{ title }}</h5>
      <p class="cd-message">{{ message }}</p>

      <!-- Actions -->
      <div class="cd-actions">
        <button type="button" class="cd-btn cd-btn-cancel" data-bs-dismiss="modal" [disabled]="loading">
          Cancel
        </button>
        <button type="button" class="cd-btn cd-btn-confirm" (click)="confirmed.emit()" [disabled]="loading">
          @if (loading) {
            <span class="spinner-border spinner-border-sm me-2"></span>
          }
          {{ confirmLabel }}
        </button>
      </div>

    </div>
  </div>
</div>
