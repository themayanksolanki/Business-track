<div class="picker">
  <div #trigger class="picker-trigger"
       [class.picker-trigger-compact]="compact"
       [class.picker-trigger-disabled]="disabled"
       [class.picker-trigger-invalid]="!!error">
    <button type="button" class="picker-icon-btn" [disabled]="disabled" (click)="toggleIcon()" title="Open calendar">
      <svg class="picker-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3.5" y="5" width="17" height="16" rx="2.5"></rect>
        <path d="M3.5 9.5h17"></path>
        <path d="M8 3v3.2"></path>
        <path d="M16 3v3.2"></path>
      </svg>
    </button>

    <input class="picker-input" type="text" inputmode="numeric" autocomplete="off"
           [value]="inputText" [placeholder]="effectivePlaceholder" [disabled]="disabled"
           (focus)="onFocus()" (input)="onInput($event)" (blur)="onBlur()" (keydown.enter)="onEnter($event)" />

    @if (value && !disabled) {
      <span class="picker-clear" (click)="$event.stopPropagation(); clear()" title="Clear date">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"></path></svg>
      </span>
    }
  </div>

  @if (open) {
    <div class="picker-backdrop" (click)="close()"></div>
    <div class="picker-panel"
         [style.top.px]="panelTop" [style.bottom.px]="panelBottom" [style.left.px]="panelLeft" [style.right.px]="panelRight"
         (click)="$event.stopPropagation()">
      <ngb-datepicker
        [(ngModel)]="ngbModel"
        (dateSelect)="onDateSelect($event)"
        navigation="select"
        [minDate]="$any(minDate)"
        [startDate]="startDate"
        [firstDayOfWeek]="7">
      </ngb-datepicker>

      @if (error) {
        <div class="picker-panel-error">{{ error }}</div>
      }

      <div class="picker-panel-footer">
        <button type="button" class="picker-footer-btn" (click)="selectToday()">Today</button>
        <button type="button" class="picker-footer-btn picker-footer-btn-muted" (click)="clear()">Clear</button>
      </div>
    </div>
  } @else if (error) {
    <div class="picker-error-banner"
         [style.top.px]="panelTop" [style.bottom.px]="panelBottom" [style.left.px]="panelLeft" [style.right.px]="panelRight">
      {{ error }}
    </div>
  }
</div>
