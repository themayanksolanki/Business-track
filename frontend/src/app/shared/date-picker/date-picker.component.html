<div class="picker">
  <button #trigger type="button" class="picker-trigger" [class.picker-trigger-filled]="value" [class.picker-trigger-compact]="compact" (click)="toggle()">
    <svg class="picker-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3.5" y="5" width="17" height="16" rx="2.5"></rect>
      <path d="M3.5 9.5h17"></path>
      <path d="M8 3v3.2"></path>
      <path d="M16 3v3.2"></path>
    </svg>
    <span class="picker-label" [class.picker-label-placeholder]="!value">{{ displayLabel }}</span>
    @if (value) {
      <span class="picker-clear" (click)="$event.stopPropagation(); clear()" title="Clear date">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"></path></svg>
      </span>
    }
  </button>

  @if (open) {
    <div class="picker-backdrop" (click)="close()"></div>
    <div class="picker-panel" [style.top.px]="panelTop" [style.left.px]="panelLeft" [style.right.px]="panelRight" (click)="$event.stopPropagation()">
      <div class="picker-panel-header">
        <button type="button" class="picker-nav-btn" (click)="prevMonth()" title="Previous month">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"></path></svg>
        </button>
        <span class="picker-month-label">{{ monthLabel }}</span>
        <button type="button" class="picker-nav-btn" (click)="nextMonth()" title="Next month">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"></path></svg>
        </button>
      </div>

      <div class="picker-weekday-row">
        @for (wd of weekdayLabels; track wd) {
          <span class="picker-weekday">{{ wd }}</span>
        }
      </div>

      @for (week of weeks; track $index) {
        <div class="picker-week-row">
          @for (day of week; track day.iso) {
            <button type="button" class="picker-day"
                    [class.picker-day-out]="!day.inMonth"
                    [class.picker-day-today]="day.isToday"
                    [class.picker-day-selected]="day.isSelected"
                    [disabled]="isDisabled(day.iso)"
                    (click)="selectDay(day)">
              {{ day.label }}
            </button>
          }
        </div>
      }

      <div class="picker-panel-footer">
        <button type="button" class="picker-footer-btn" (click)="selectToday()">Today</button>
        <button type="button" class="picker-footer-btn picker-footer-btn-muted" (click)="clear()">Clear</button>
      </div>
    </div>
  }
</div>
