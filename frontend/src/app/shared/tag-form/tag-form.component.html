<div class="modal fade" tabindex="-1" aria-hidden="true" [appModal]="open" (appModalClosed)="closed.emit()">
  <div class="modal-dialog modal-dialog-centered">
  @if (open) {
    <div class="modal-content tag-modal-content">
      <div class="modal-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h5 class="mb-0">
            <i class="bi bi-tag me-2"></i>{{ mode === 'create' ? 'New Tag' : 'Edit Tag' }}
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        @if (displayError) {
          <div class="alert alert-danger py-2">{{ displayError }}</div>
        }

        <form (ngSubmit)="submit()">
          <div class="mb-3">
            <label class="field-label">Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control field-input" [(ngModel)]="name" name="name" placeholder="Tag name" />
          </div>

          <div class="mb-3">
            <label class="field-label">Text color</label>
            <div class="d-flex align-items-center gap-2">
              <input type="color" class="tag-color-input" [(ngModel)]="textColor" name="textColor" />
              <input type="text" class="form-control field-input tag-color-hex" [(ngModel)]="textColor" name="textColorHex" />
            </div>
          </div>

          <div class="mb-3">
            <label class="field-label">Background color</label>
            <div class="d-flex align-items-center gap-2">
              <input type="color" class="tag-color-input" [(ngModel)]="backgroundColor" name="backgroundColor" />
              <input type="text" class="form-control field-input tag-color-hex" [(ngModel)]="backgroundColor" name="backgroundColorHex" />
            </div>
          </div>

          <div class="mb-4">
            <label class="field-label">Preview</label>
            <div>
              <app-tag-pill [tag]="previewTag"></app-tag-pill>
            </div>
          </div>

          <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-light modal-submit-btn" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary modal-submit-btn" [disabled]="loading">
              @if (loading) { <span class="spinner-border spinner-border-sm me-2"></span> }
              {{ loading ? 'Saving...' : 'Save' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  }
  </div>
</div>
