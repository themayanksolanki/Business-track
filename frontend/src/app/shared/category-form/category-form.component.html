<div class="modal fade" tabindex="-1" aria-hidden="true" [appModal]="open" (appModalClosed)="closed.emit()">
  <div class="modal-dialog modal-dialog-centered">
  @if (open) {
    <div class="modal-content category-modal-content">
      <div class="modal-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h5 class="mb-0">
            <i class="bi bi-bookmark me-2"></i>{{ mode === 'create' ? 'New Category' : 'Edit Category' }}
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        @if (parentName) {
          <p class="text-muted small mb-3">Sub-category of <strong>{{ parentName }}</strong></p>
        }

        @if (displayError) {
          <div class="alert alert-danger py-2">{{ displayError }}</div>
        }

        <form (ngSubmit)="submit()">
          <div class="mb-3">
            <label class="field-label">Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control field-input" [(ngModel)]="name" name="name" placeholder="Category name" />
          </div>

          <div class="mb-3">
            <label class="field-label">Overview</label>
            <textarea class="form-control field-input" style="height:auto" [(ngModel)]="overview" name="overview" rows="3"
                      placeholder="Optional description"></textarea>
          </div>

          <div class="mb-4">
            <label class="field-label">Title color</label>
            <div class="d-flex align-items-center gap-2">
              <input type="color" class="category-color-input" [(ngModel)]="color" name="color" />
              <input type="text" class="form-control field-input category-color-hex" [(ngModel)]="color" name="colorHex" />
            </div>
          </div>

          <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-light modal-submit-btn" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary modal-submit-btn" [disabled]="loading">
              @if (loading) { <span class="spinner-border spinner-border-sm me-2"></span> }
              {{ loading ? 'Saving...' : 'Save' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  }
  </div>
</div>
