<div class="toast-stack">
  @for (toast of notifications.toasts(); track toast.id) {
    <div class="toast-item" [class.toast-success]="toast.type === 'success'" [class.toast-error]="toast.type === 'error'">
      <i class="bi" [class.bi-check-circle-fill]="toast.type === 'success'" [class.bi-exclamation-circle-fill]="toast.type === 'error'"></i>
      <span class="toast-message">{{ toast.message }}</span>
      <button type="button" class="toast-close" (click)="notifications.dismiss(toast.id)" aria-label="Dismiss">
        <i class="bi bi-x"></i>
      </button>
    </div>
  }
</div>
