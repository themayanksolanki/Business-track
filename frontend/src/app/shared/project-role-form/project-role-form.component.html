<div class="modal fade" tabindex="-1" aria-hidden="true" [appModal]="open" (appModalClosed)="closed.emit()">
  <div class="modal-dialog modal-dialog-centered">
  @if (open) {
    <div class="modal-content role-modal-content">
      <div class="modal-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h5 class="mb-0">
            <i class="bi bi-person-badge me-2"></i>{{ mode === 'create' ? 'New Role' : 'Edit Role' }}
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        @if (displayError) {
          <div class="alert alert-danger py-2">{{ displayError }}</div>
        }

        <form (ngSubmit)="submit()">
          <div class="mb-3">
            <label class="field-label">Title <span class="text-danger">*</span></label>
            <input
              type="text"
              class="form-control field-input"
              [(ngModel)]="title"
              name="title"
              placeholder="Role title"
              [disabled]="titleLocked"
            />
            @if (titleLocked) {
              <div class="field-hint">Default roles cannot be renamed.</div>
            }
          </div>

          <div class="mb-4">
            <label class="field-label">Description</label>
            <textarea
              class="form-control field-input"
              rows="3"
              [(ngModel)]="description"
              name="description"
              placeholder="What can this role do?"
            ></textarea>
          </div>

          <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-light modal-submit-btn" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary modal-submit-btn" [disabled]="loading">
              @if (loading) { <span class="spinner-border spinner-border-sm me-2"></span> }
              {{ loading ? 'Saving...' : 'Save' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  }
  </div>
</div>
