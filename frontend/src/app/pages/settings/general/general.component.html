<div class="general-panel">
  <h6 class="mb-1 text-muted">Date Format</h6>
  <p class="general-desc">Choose how dates are displayed across the app.</p>

  @if (error) {
    <div class="alert alert-danger py-2">{{ error }}</div>
  }

  <div class="format-grid mb-4">
    @for (opt of dateFormats; track opt.value) {
      <button
        type="button"
        class="format-opt"
        [class.format-opt-active]="auth.currentUser()?.dateFormat === opt.value"
        [disabled]="!!savingDateFormat"
        (click)="selectDateFormat(opt.value)">
        <span class="format-opt-label">{{ opt.label }}</span>
        <span class="format-opt-example">{{ exampleDate(opt.value) }}</span>
        @if (savingDateFormat === opt.value) {
          <span class="spinner-border spinner-border-sm format-opt-spinner"></span>
        } @else if (auth.currentUser()?.dateFormat === opt.value) {
          <i class="bi bi-check-circle-fill format-opt-check"></i>
        }
      </button>
    }
  </div>

  <h6 class="mb-1 text-muted">Time Format</h6>
  <p class="general-desc">Choose 12-hour or 24-hour time.</p>

  <div class="format-grid">
    @for (opt of timeFormats; track opt.value) {
      <button
        type="button"
        class="format-opt"
        [class.format-opt-active]="auth.currentUser()?.timeFormat === opt.value"
        [disabled]="!!savingTimeFormat"
        (click)="selectTimeFormat(opt.value)">
        <span class="format-opt-label">{{ opt.label }}</span>
        <span class="format-opt-example">{{ exampleTime(opt.value) }}</span>
        @if (savingTimeFormat === opt.value) {
          <span class="spinner-border spinner-border-sm format-opt-spinner"></span>
        } @else if (auth.currentUser()?.timeFormat === opt.value) {
          <i class="bi bi-check-circle-fill format-opt-check"></i>
        }
      </button>
    }
  </div>
</div>
