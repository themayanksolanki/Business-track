<div class="page">
  <div class="mb-4">
    <h1 class="h3 mb-1">Settings</h1>
    <p class="text-muted mb-0 small">Manage organization-wide configuration.</p>
  </div>

  <app-tab-strip [tabs]="tabs" [activeKey]="activeTab" (tabChange)="activeTab = $event"></app-tab-strip>

  @if (activeTab === 'general') {
    <app-general-settings></app-general-settings>
  }

  @if (activeTab === 'departments') {
    <app-departments></app-departments>
  }

  @if (activeTab === 'tags') {
    <app-tags></app-tags>
  }

  @if (activeTab === 'categories') {
    <app-categories></app-categories>
  }

  @if (activeTab === 'projectRoles') {
    <app-project-roles></app-project-roles>
  }
</div>
