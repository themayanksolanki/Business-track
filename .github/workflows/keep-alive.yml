name: Keep Render server alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://business-track.onrender.com/health)
          echo "Health check responded with status $status"
          if [ "$status" -ge 400 ]; then
            echo "Health check failed with status $status"
            exit 1
          fi
